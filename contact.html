<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | AI CV Analytics</title>
  
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script type="text/javascript">
    (function(){
       emailjs.init("YOUR_PUBLIC_KEY"); // EmailJS dashboard se milega
    })();
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/style.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

  <style>
    /* ATS Score Style Background Setup */
    body { 
        background: #09020f; 
        color: white; 
        min-height: 100vh; 
        overflow-x: hidden; 
        position: relative;
    }

    #particles-js {
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        z-index: 1; /* Background layer */
    }

    .bg-glow {
        position: fixed;
        width: 700px;
        height: 700px;
        background: radial-gradient(circle, rgba(168, 85, 247, 0.2) 0%, rgba(124, 58, 237, 0.1) 40%, transparent 70%);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        filter: blur(100px);
        z-index: 2; /* Layer above particles but below content */
        pointer-events: none;
    }

    .contact-wrapper {
      position: relative;
      z-index: 10; /* Ensures content is clickable above background */
      padding: 150px 8% 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .contact-grid {
      display: flex;
      gap: 40px;
      width: 100%;
      max-width: 1100px;
      flex-wrap: wrap;
      margin-top: 40px;
    }

    /* Glass Panels */
    .info-panel, .form-panel {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(168, 85, 247, 0.2);
      backdrop-filter: blur(25px);
      border-radius: 28px;
      padding: 40px;
    }

    .info-panel h2 {
      color: #a855f7;
      margin-bottom: 25px;
      font-size: 28px;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 30px;
    }

    .info-icon {
      font-size: 24px;
      background: rgba(168, 85, 247, 0.15);
      padding: 12px;
      border-radius: 15px;
      color: #c084fc;
    }

    .info-text p {
      font-weight: 600;
      font-size: 14px;
      color: #a855f7;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .info-text h4 { font-size: 18px; color: #ffffff; }

    input, textarea {
      width: 100%;
      padding: 15px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: white;
      outline: none;
      transition: 0.3s;
    }

    input:focus, textarea:focus {
      border-color: #a855f7;
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
    }

    .send-btn {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      background: linear-gradient(90deg, #9333ea, #4f46e5);
      color: white;
      font-weight: 600;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    .social-stack { display: flex; gap: 15px; margin-top: 20px; }
    .social-stack a {
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50px;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.02);
      transition: 0.3s;
    }
    .social-stack a:hover { background: #7c3aed; transform: translateY(-3px); }
  </style>
</head>
<body>

  <div id="particles-js"></div>
  <div class="bg-glow"></div>

  <nav id="navbar">
    <h1 id="logo">AI CV <span>Analytics</span></h1>
    <ul>
  <li><a href="index.html" style="text-decoration: none; color: inherit;">Home</a></li>
  <li><a href="checkats.html" style="text-decoration: none; color: inherit;">Check ATS</a></li>
  <li><a href="compare.html" style="text-decoration: none; color: inherit;">Comparison</a></li>
  <li><a href="contact.html" style="text-decoration: none; color: inherit;">Contact</a></li>
</ul>
  </nav>

  <div class="contact-wrapper">
    <h2 class="section-title">Get In <span>Touch</span></h2>
    
    <div class="contact-grid">
      <div class="info-panel" id="infoPanel">
        <h2>Contact Info</h2>
        <p style="color: #d4d4d8; margin-bottom: 40px;">Ready to revolutionize your hiring process? Reach out to us today.</p>
        
        <div class="info-item">
          <div class="info-icon">📍</div>
          <div class="info-text">
            <p>Our Office</p>
            <h4>Delhi, India</h4>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon">📧</div>
          <div class="info-text">
            <p>Email Us</p>
            <h4>mukulroy4042@gmail.com</h4>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon">📞</div>
          <div class="info-text">
            <p>Call Us</p>
            <h4>+91 7970997207</h4>
          </div>
        </div>

        <div class="social-stack">
          <a href="https://linkedin.com/in/your-profile" target="_blank">LinkedIn</a>
          <a href="https://github.com/your-username" target="_blank">GitHub</a>
          <a href="https://wa.me/917970997207?text=Hi..." target="_blank">WhatsApp</a>
        </div>
      </div>

      <div class="form-panel" id="formPanel">
        <form id="contactForm">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="userName" placeholder="Name..." required>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="userEmail" placeholder="abcd@example.com" required>
          </div>
          <div class="form-group">
            <label>Subject</label>
            <input type="text" id="subject" placeholder="Project Inquiry" required>
          </div>
          <div class="form-group">
            <label>Message</label>
            <textarea id="message" rows="4" placeholder="How can we help you?" required></textarea>
          </div>
          <button type="submit" class="send-btn">Send Message</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    window.onload = function() {
      // Initialize Particles exactly like ATS Score Page
      if (typeof particlesJS !== "undefined") {
        particlesJS("particles-js", {
          particles: {
            number: { value: 80, density: { enable: true, value_area: 800 } },
            color: { value: "#a855f7" },
            opacity: { value: 0.3 },
            size: { value: 3 },
            line_linked: { enable: true, distance: 150, color: "#7c3aed", opacity: 0.2, width: 1 },
            move: { enable: true, speed: 2 }
          },
          interactivity: { events: { onhover: { enable: true, mode: "grab" } } },
          retina_detect: true
        });
      }

      // Entrance Animations
      const tl = gsap.timeline();
      tl.from("nav", { y: -100, opacity: 0, duration: 1 })
        .from(".section-title", { y: 50, opacity: 0, duration: 1 }, "-=0.5")
        .from("#infoPanel", { opacity: 0, x: -50, duration: 1 }, "-=0.5")
        .from("#formPanel", { opacity: 0, x: 50, duration: 1 }, "-=0.8");
    };

    // Smooth Cursor Glow (ATS Style)
    document.addEventListener("mousemove", (e) => {
      gsap.to(".bg-glow", {
        duration: 0.7,
        left: e.clientX,
        top: e.clientY,
        ease: "power2.out"
      });
    });

    // Form Handle
    document.getElementById("contactForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const name = document.getElementById("userName").value;
      alert("Thanks " + name + "! Your message has been sent successfully.");
      this.reset();
    });

    // Navbar Scroll Logic
    window.addEventListener("scroll", () => {
      const nav = document.getElementById("navbar");
      if (window.scrollY > 50) {
        nav.classList.add("scrolled");
      } else {
        nav.classList.remove("scrolled");
      }
    });
  </script>
</body>
</html>
