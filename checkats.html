<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Score & Job Match | AI CV Analytics</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: #09020f; 
            color: white; 
            min-height: 100vh; 
            overflow-x: hidden; 
            position: relative;
        }

        /* Animated Background Layer */
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; }

        .bg-glow {
            position: fixed; width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            filter: blur(100px); z-index: 2; pointer-events: none;
        }

        /* =========================
           NAVBAR (Reacts on Scroll)
        ========================= */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; width: 90%; position: fixed; top: 20px;
            left: 50%; transform: translateX(-50%); border-radius: 50px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1); z-index: 1000;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Scrolled state to match Contact page behavior */
        nav.scrolled {
            top: 0;
            width: 100%;
            border-radius: 0;
            padding: 15px 60px;
            background: rgba(9, 2, 15, 0.9) !important;
            border-bottom: 1px solid rgba(168, 85, 247, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        nav h1 { font-size: 24px; font-weight: 700; transition: 0.3s; }
        nav h1 span { color: #a855f7; }
        
        nav ul { display: flex; gap: 10px; list-style: none; }
        nav ul li { position: relative; padding: 8px 15px; }
        
        nav ul li a { 
            color: #d4d4d8; 
            text-decoration: none; 
            font-size: 15px; 
            font-weight: 500; 
            transition: 0.3s; 
        }
        
        nav ul li:hover a { color: #fff; }
        
        /* Premium Underline Animation */
        nav ul li::after {
            content: ""; position: absolute; width: 0%; height: 2px; bottom: 5px; 
            left: 50%; transform: translateX(-50%); 
            background: linear-gradient(90deg, #ff4d4d, #7c3aed);
            transition: 0.3s ease-in-out; border-radius: 2px;
        }
        nav ul li:hover::after { width: 70%; }

        /* =========================
           CONTENT WRAPPER
        ========================= */
        .wrapper { position: relative; z-index: 10; padding: 150px 5% 50px; text-align: center; }

        .glass-card {
            max-width: 600px; margin: 40px auto; padding: 40px;
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(168, 85, 247, 0.2);
            backdrop-filter: blur(25px); border-radius: 28px;
            transition: transform 0.3s ease;
        }

        .hero-btn {
            padding: 15px 35px; border-radius: 12px; border: none;
            background: linear-gradient(90deg, #9333ea, #4f46e5);
            color: white; font-weight: 600; cursor: pointer; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(147, 51, 234, 0.3);
        }

        /* Speedometer Section */
        .speedometer { position: relative; margin: 30px auto; width: 200px; height: 200px; }
        svg { transform: rotate(-90deg); }
        .bg-circle { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 12; }
        .progress-circle {
            fill: none; stroke: #a855f7; stroke-width: 12; stroke-linecap: round;
            stroke-dasharray: 565; stroke-dashoffset: 565; transition: 2s ease-out;
        }
        .score-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; font-weight: 700; }

        /* Job Section Styling */
        .job-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; margin-top: 40px; width: 100%; max-width: 1100px; margin-left: auto; margin-right: auto;
        }
        .job-card { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(168, 85, 247, 0.2); 
            backdrop-filter: blur(20px); border-radius: 24px; padding: 25px; 
            text-align: left; opacity: 0; transform: translateY(30px);
        }
        .company-logo { width: 40px; height: 40px; background: #fff; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; }
        .match-badge { display: inline-block; padding: 4px 10px; border-radius: 50px; background: rgba(34, 197, 94, 0.1); color: #22c55e; font-size: 11px; margin-bottom: 8px; border: 1px solid #22c55e; }
        .apply-btn { width: 100%; margin-top: 15px; padding: 10px; border-radius: 8px; border: none; background: #a855f7; color: white; cursor: pointer; font-weight: 600; font-size: 13px; }

        .feedback-item {
            background: rgba(255, 255, 255, 0.05); margin-bottom: 10px; padding: 12px;
            border-radius: 12px; border-left: 4px solid #a855f7; font-size: 14px; text-align: left;
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>
    <div class="bg-glow"></div>

    <nav id="navbar">
        <h1 id="logo">AI CV <span>Analytics</span></h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="checkats.html">Check ATS</a></li>
            <li><a href="compare.html">Comparison</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="wrapper">
        <h2 id="main-title" style="font-size: 45px;">AI Resume <span>Analysis</span></h2>
        
        <div class="glass-card" id="inputCard">
            <input type="file" id="atsFile" style="color: #888; margin-bottom: 25px; cursor: pointer;">
            <br>
            <button class="hero-btn" onclick="startFullAnalysis()">Start Analysis</button>

            <div id="resultArea" style="display: none; margin-top: 30px;">
                <div class="speedometer">
                    <svg width="200" height="200">
                        <circle class="bg-circle" cx="100" cy="100" r="90"></circle>
                        <circle id="atsCircle" class="progress-circle" cx="100" cy="100" r="90"></circle>
                    </svg>
                    <div class="score-display"><span id="atsNum">0</span>%</div>
                </div>
                <h3 id="atsStatus" style="font-size: 24px; font-weight: 600; margin-bottom: 20px;"></h3>
                <div id="feedbackList"></div>
            </div>
        </div>

        <div id="jobSection" style="display: none; margin-top: 60px;">
            <h2 style="margin-bottom: 30px;">AI Recommended <span>Jobs For You</span></h2>
            <div class="job-grid" id="jobGrid"></div>
        </div>
    </div>

<script>
    // Particle & UI Setup
    window.onload = function() {
        if (typeof particlesJS !== "undefined") {
            particlesJS("particles-js", {
                particles: { number: { value: 80 }, color: { value: "#a855f7" }, opacity: { value: 0.3 }, line_linked: { enable: true, color: "#a855f7", opacity: 0.2 }, move: { speed: 2 } },
                interactivity: { events: { onhover: { enable: true, mode: "grab" } }, modes: { grab: { distance: 200, line_linked: { opacity: 0.5 } } } }
            });
        }
        gsap.from("nav", { y: -100, opacity: 0, duration: 1 });
        gsap.from("#main-title", { y: 50, opacity: 0, duration: 1 }, "-=0.5");
        gsap.from("#inputCard", { scale: 0.9, opacity: 0, duration: 0.8 }, "-=0.5");
    };

    window.addEventListener("scroll", () => {
        const nav = document.getElementById("navbar");
        if (window.scrollY > 50) nav.classList.add("scrolled");
        else nav.classList.remove("scrolled");
    });

    document.addEventListener("mousemove", (e) => {
        gsap.to(".bg-glow", { duration: 0.7, left: e.clientX, top: e.clientY, ease: "power2.out" });
    });

    // ============================================
    // REAL BACKEND CONNECTION LOGIC (FIXED)
    // ============================================
    async function startFullAnalysis() {
        const fileInput = document.getElementById('atsFile');
        const file = fileInput.files[0];
        if(!file) { alert("Mukul, pehle ek PDF resume toh select karo!"); return; }

        // UI Reset
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('jobSection').style.display = 'none';
        document.getElementById('feedbackList').innerHTML = "";
        
        const status = document.getElementById('atsStatus');
        status.innerText = "Scanning with AI...";
        status.style.color = "#a855f7";

        const circle = document.getElementById('atsCircle');
        const circumference = 2 * Math.PI * 90;
        circle.style.strokeDashoffset = circumference;
        document.getElementById('atsNum').innerText = "0";

        // FormData for Backend
        const formData = new FormData();
        formData.append("resume", file);

        // --- DYNAMIC URL LOGIC ---
        // Agar localhost hai toh local backend, warna Render wala
        const API_BASE = window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost" 
            ? "http://127.0.0.1:5000" 
            : "https://ai-cv-analytics.onrender.com"; // YAHAN APNA RENDER URL DALNA

        try {
            const response = await fetch(`${API_BASE}/upload`, {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            if (data.error) {
                alert("Error: " + data.error);
                status.innerText = "Scan Failed ❌";
                status.style.color = "#ef4444";
                return;
            }

            const score = data.ats_score;
            const skills = data.skills;
            const role = data.recommended_role;

            // Animate Score
            setTimeout(() => {
                circle.style.strokeDashoffset = circumference - (score / 100) * circumference;
            }, 100);
            animateNum('atsNum', score);

            // Show Feedback
            setTimeout(() => {
                if(score >= 80) { status.innerText = "Industry Ready! 🚀"; status.style.color = "#22c55e"; }
                else if (score >= 50) { status.innerText = "Needs Improvement ⚠️"; status.style.color = "#eab308"; }
                else { status.innerText = "Critical State ❌"; status.style.color = "#ef4444"; }

                const list = document.getElementById('feedbackList');
                let tips = [
                    `✅ Recommended Role: ${role}`,
                    `💡 Skills Found: ${skills.length > 0 ? skills.join(', ') : 'None detected. Improve keywords!'}`,
                    score >= 80 ? "✅ Excellent keyword density." : "⚠️ Add more technical keywords from Job Description."
                ];

                tips.forEach((tip, i) => {
                    const div = document.createElement('div');
                    div.className = 'feedback-item';
                    div.innerText = tip;
                    list.appendChild(div);
                    gsap.from(div, { opacity: 0, x: -20, delay: i * 0.2 });
                });

                showJobMatches(role);
            }, 2000);

        } catch (error) {
            console.error(error);
            alert("Backend is offline! Agar Render use kar rahe ho toh it might be 'sleeping'. 1 minute ruko.");
            status.innerText = "Server Error";
        }
    }

    function showJobMatches(role) {
        document.getElementById('jobSection').style.display = 'block';
        const grid = document.getElementById('jobGrid');
        grid.innerHTML = "";
        
        const jobs = [
            { title: role, company: "Google", match: "98%", logo: "G" },
            { title: `Junior ${role}`, company: "Amazon", match: "85%", logo: "A" },
            { title: `${role} Intern`, company: "Microsoft", match: "72%", logo: "M" }
        ];

        jobs.forEach(job => {
            const card = `<div class="job-card"><div class="match-badge">${job.match} Match</div><div class="company-logo">${job.logo}</div><h3>${job.title}</h3><p style="color: #888; font-size: 13px;">${job.company} • Remote</p><button class="apply-btn">Apply Now</button></div>`;
            grid.innerHTML += card;
        });
        gsap.to(".job-card", { opacity: 1, y: 0, stagger: 0.2, duration: 0.8, ease: "power2.out" });
    }

    function animateNum(id, target) {
        let c = 0;
        let i = setInterval(() => {
            if(c >= target) { clearInterval(i); document.getElementById(id).innerText = target; }
            else { c++; document.getElementById(id).innerText = c; }
        }, 20);
    }
</script>
   </body>
</html>
